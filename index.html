<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Quest: TEKS 7.13D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <p>A game made by Teacher J</p>
        <div class="stats-bar">
            <div class="stat">Timer: <span id="timer">02:00</span></div>
            <div class="stat">Gold: <span id="gold-count">0</span> 💰</div>
        </div>
      <div class="prize-info-wrapper">
    <details>
        <summary>View Prize Goals (Click to Expand)</summary>
        <div class="prize-table-container">
            <table class="prize-table">
                <thead>
                    <tr>
                        <th>Gold Needed</th>
                        <th>Prize</th>
                    </tr>
                </thead>
                <tbody>
                    <tr style="color: #f1c40f; font-weight: bold;">
                        <td>5,000+</td>
                        <td>BIG PLUSH! 🧸🏆</td>
                    </tr>
                    <tr style="color: #e67e22;">
                        <td>3,500</td>
                        <td>Small Plush 🧸</td>
                    </tr>
                    <tr style="color: #9b59b6;">
                        <td>2,000</td>
                        <td>Candy 🍬</td>
                    </tr>
                    <tr style="color: #3498db;">
                        <td>1,000</td>
                        <td>Sticker ✨</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </details>
</div>
        <div id="game-container">
            <div id="question-box">
                <h2 id="question-text">Click Start to Begin!</h2>
                <div id="options-container">
                    </div>
            </div>
        </div>

        <div id="feedback"></div>
        <button id="start-btn" onclick="startGame()">Start Lesson Check</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
