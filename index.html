<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Quest: TEKS 7.13D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="stats-bar">
            <div class="stat">Timer: <span id="timer">02:00</span></div>
            <div class="stat">Gold: <span id="gold-count">0</span> 💰</div>
        </div>

        <div id="game-container">
            <div id="question-box">
                <h2 id="question-text">Click Start to Begin!</h2>
                <div id="options-container">
                    </div>
            </div>
        </div>

        <div id="feedback"></div>
        <button id="start-btn" onclick="startGame()">Start Lesson Check</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
